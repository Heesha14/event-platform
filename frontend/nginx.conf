server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets and the SPA-ish single page itself.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to the Event Service. Trailing slashes on both sides so
    # /api/events/5 -> http://event-service:4001/events/5
    location /api/events/ {
        proxy_pass http://event-service:4001/events/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/events {
        proxy_pass http://event-service:4001/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Reverse proxy to the Program Service.
    location /api/programs/ {
        proxy_pass http://program-service:4002/programs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/programs {
        proxy_pass http://program-service:4002/programs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Reverse proxy to the Registration Service.
    location /api/registrations/ {
        proxy_pass http://registration-service:4003/registrations/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/registrations {
        proxy_pass http://registration-service:4003/registrations;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Reverse proxy to the Analytics Service.
    location /api/analytics/ {
        proxy_pass http://analytics-service:4004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
