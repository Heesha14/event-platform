apiVersion: v1
kind: ConfigMap
metadata:
  name: program-service-config
  namespace: events-platform
data:
  PORT: "4002"
  DB_HOST: "mssql"
  DB_PORT: "1433"
  DB_NAME: "eventsdb"
  DB_ENCRYPT: "false"          # local SQL Server has no valid cert; Azure uses "true" (see .env.example)
  DB_TRUST_SERVER_CERT: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: program-service
  namespace: events-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: program-service
  template:
    metadata:
      labels:
        app: program-service
    spec:
      containers:
        - name: program-service
          image: program-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 4002
          envFrom:
            - configMapRef:
                name: program-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mssql-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mssql-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: program-service
  namespace: events-platform
  labels:
    app: program-service
spec:
  selector:
    app: program-service
  ports:
    - name: http
      port: 4002
      targetPort: 4002
  type: ClusterIP
