apiVersion: v1
kind: ConfigMap
metadata:
  name: event-service-config
  namespace: events-platform
data:
  PORT: "4001"
  DB_HOST: "mssql"
  DB_PORT: "1433"
  DB_NAME: "eventsdb"
  DB_ENCRYPT: "false"          # local SQL Server has no valid cert; Azure uses "true" (see .env.example)
  DB_TRUST_SERVER_CERT: "true"
  ALERT_EMAIL_FROM: ""         # low-seats SendGrid alert; left blank locally so mailer.js no-ops
  ALERT_EMAIL_TO: ""
  LOW_SEATS_THRESHOLD: "10"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: events-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
        - name: event-service
          image: event-service:local
          imagePullPolicy: Never   # image is built directly into minikube's docker daemon
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: event-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mssql-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mssql-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: events-platform
spec:
  selector:
    app: event-service
  ports:
    - port: 4001
      targetPort: 4001
  type: ClusterIP
